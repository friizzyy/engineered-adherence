<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engineered Adherence | Select Region</title>
<meta name="description" content="Engineered Adherence — precision peptide protocols. Select your region to continue.">
<meta property="og:title" content="Engineered Adherence | Select Region">
<meta property="og:description" content="Precision peptide protocols. Select your region to continue.">
<meta property="og:type" content="website">
<link rel="icon" href="favicon.ico" type="image/x-icon">
<script>
(function(){
  var t = localStorage.getItem('ea-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
})();
</script>
<link rel="stylesheet" href="/qa/css/style.css">
<style>
  .gate{
    min-height:100vh;
    display:flex;flex-direction:column;
    justify-content:center;align-items:center;
    padding:40px 24px;
    position:relative;z-index:1;
  }
  .gate-wordmark{
    font-family:'Playfair Display',serif;
    font-size:24px;font-weight:500;letter-spacing:0.02em;
    color:var(--text-heading);
    margin-bottom:12px;
    transition:color .5s;
  }
  .gate-tagline{
    font-size:12px;letter-spacing:3px;text-transform:uppercase;
    color:var(--faint);font-weight:300;
    margin-bottom:64px;
    transition:color .5s;
  }
  .region-cards{
    display:flex;gap:24px;
    max-width:640px;width:100%;
  }
  .region-card{
    flex:1;
    background:var(--bg-card);
    border:1px solid var(--line);
    padding:48px 32px;
    text-align:center;
    text-decoration:none;
    transition:all .5s cubic-bezier(0.4,0,0.2,1);
    position:relative;overflow:hidden;
  }
  .region-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:1px;
    background:linear-gradient(90deg,transparent,var(--accent-solid),transparent);
    transform:scaleX(0);transition:transform .5s cubic-bezier(0.4,0,0.2,1);
    opacity:0.6;
  }
  .region-card:hover{
    transform:translateY(-5px);
    border-color:var(--line-strong);
    background:var(--bg-card-hover);
    box-shadow:var(--shadow-card-subtle);
  }
  .region-card:hover::before{transform:scaleX(1)}
  .region-flag{
    font-size:24px;
    margin-bottom:20px;
    opacity:0.7;
  }
  .region-name{
    font-family:'Playfair Display',serif;
    font-size:22px;font-weight:500;
    color:var(--text-heading);
    margin-bottom:12px;
    transition:color .5s;
  }
  .region-desc{
    font-size:12px;color:var(--muted);
    line-height:1.8;font-weight:300;
    margin-bottom:24px;
    transition:color .5s;
  }
  .region-cta{
    font-size:10px;letter-spacing:2.5px;text-transform:uppercase;
    color:var(--faint);font-weight:400;
    transition:color .3s;
  }
  .region-card:hover .region-cta{
    color:var(--text-heading);
  }
  .gate-footer{
    margin-top:64px;
    font-size:12px;color:var(--faint);
    font-weight:300;letter-spacing:.5px;
    transition:color .5s;
  }
  .gate-theme{
    position:fixed;top:24px;right:24px;z-index:100;
  }
  @media(max-width:600px){
    .region-cards{flex-direction:column;gap:16px}
    .region-card{padding:36px 24px}
    .gate-wordmark{font-size:20px}
    .gate-tagline{margin-bottom:48px}
  }
</style>
</head>
<body>

<div class="gate-theme">
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme"></button>
</div>

<div class="gate">
  <div class="gate-wordmark">Engineered Adherence</div>
  <p class="gate-tagline">Select your region to continue</p>

  <div class="region-cards">
    <a href="/us/" class="region-card">
      <div class="region-flag">&#127482;&#127480;</div>
      <div class="region-name">United States</div>
      <div class="region-desc">Research compounds · Shop online · AI protocol advisor</div>
      <div class="region-cta">Enter →</div>
    </a>

    <a href="/qa/" class="region-card">
      <div class="region-flag">&#127478;&#127462;</div>
      <div class="region-name">Qatar</div>
      <div class="region-desc">Therapeutic protocols · Clinical consultation · Doha</div>
      <div class="region-cta">Enter →</div>
    </a>
  </div>

  <p class="gate-footer">&copy; 2026 Engineered Adherence</p>
</div>

<script>
(function(){
  var toggle = document.getElementById('themeToggle');
  if(toggle){
    toggle.addEventListener('click', function(){
      var html = document.documentElement;
      var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('ea-theme', next);
    });
  }
})();
</script>
</body>
</html>
