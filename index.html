<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engineered Adherence</title>
<meta name="description" content="Research-grade peptide compounds for serious optimization. Precision protocols, clinical purity, AI-driven stack design.">
<meta property="og:title" content="Engineered Adherence">
<meta property="og:description" content="Research-grade peptide compounds for serious optimization. Precision protocols, clinical purity, AI-driven stack design.">
<meta property="og:type" content="website">
<link rel="icon" href="favicon.ico" type="image/x-icon">
<script>window.location.replace('/us/');</script>
<script>
(function(){
  var t = localStorage.getItem('ea-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
})();
</script>
<link rel="stylesheet" href="/qa/css/style.css">
<style>
  @keyframes gateIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
  @keyframes sweepLine{from{transform:translateX(-100%)}to{transform:translateX(100%)}}

  .gate{
    min-height:100vh;
    display:flex;flex-direction:column;
    justify-content:center;align-items:center;
    padding:40px 24px;
    position:relative;z-index:1;
  }
  .gate-wordmark{
    font-family:var(--font-body);
    font-size:18px;font-weight:300;letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--text-heading);
    margin-bottom:12px;
    transition:color .5s;
    opacity:0;animation:gateIn .8s ease .2s forwards;
  }
  .gate-tagline{
    font-size:11px;letter-spacing:var(--tracking-eyebrow);text-transform:uppercase;
    color:var(--faint);font-weight:400;
    margin-bottom:64px;
    transition:color .5s;
    opacity:0.4;
    animation:gateIn .8s ease .3s forwards;
    animation-fill-mode:both;
  }
  .region-cards{
    display:flex;gap:24px;
    max-width:640px;width:100%;
  }
  .region-card{
    flex:1;
    background:var(--bg-card);
    border:1px solid rgba(255,255,255,0.06);
    padding:72px 40px;
    text-align:center;
    text-decoration:none;
    transition:all .35s cubic-bezier(0.22,1,0.36,1);
    position:relative;overflow:hidden;
    opacity:0;
  }
  [data-theme="light"] .region-card{
    border-color:rgba(0,0,0,0.06);
  }
  .region-card:nth-child(1){animation:gateIn .6s ease .4s forwards}
  .region-card:nth-child(2){animation:gateIn .6s ease .7s forwards}
  .region-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:1px;
    background:linear-gradient(90deg,transparent,var(--accent-solid),transparent);
    transform:scaleX(0);transition:transform .5s cubic-bezier(0.4,0,0.2,1);
    opacity:0.6;
  }
  /* Sweep line on hover */
  .region-card::after{
    content:'';position:absolute;top:0;left:0;right:0;height:1px;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);
    transform:translateX(-100%);
    transition:none;opacity:0;
  }
  .region-card:hover::after{
    animation:sweepLine .6s ease forwards;opacity:1;
  }
  .region-card:hover{
    transform:translateY(-5px) scale(1.01);
    border-color:rgba(255,255,255,0.12);
    background:var(--bg-card-hover);
    box-shadow:var(--shadow-card-subtle);
  }
  [data-theme="light"] .region-card:hover{
    border-color:rgba(0,0,0,0.12);
  }
  .region-card:hover::before{transform:scaleX(1)}
  .region-flag{
    margin-bottom:24px;
    opacity:0.5;
  }
  .region-flag svg{
    width:32px;height:24px;
    stroke:var(--muted);fill:none;stroke-width:1;
  }
  .region-name{
    font-family:var(--font-display);
    font-size:22px;font-weight:400;
    color:var(--text-heading);
    margin-bottom:8px;
    transition:color .5s;
    letter-spacing:var(--tracking-display);
  }
  .region-sub{
    font-size:11px;color:var(--faint);
    letter-spacing:var(--tracking-eyebrow);text-transform:uppercase;
    opacity:0.4;margin-bottom:20px;
  }
  .region-desc{
    font-size:12px;color:var(--muted);
    line-height:1.8;font-weight:300;
    margin-bottom:24px;
    transition:color .5s;
  }
  .region-cta{
    font-size:10px;letter-spacing:2.5px;text-transform:uppercase;
    color:var(--faint);font-weight:400;
    transition:color .3s;
  }
  .region-card:hover .region-cta{
    color:var(--text-heading);
  }
  .region-ghost{position:absolute;bottom:-16px;right:-8px;font-size:120px;font-weight:100;letter-spacing:-0.04em;color:var(--text-heading);opacity:0.03;pointer-events:none;user-select:none;line-height:1;}
  .gate-footer{
    margin-top:64px;
    font-size:11px;color:var(--faint);
    font-weight:300;letter-spacing:.5px;
    transition:color .5s;
    opacity:0.2;
    animation:gateIn .8s ease 1s forwards;
    animation-fill-mode:both;
  }
  .gate-theme{
    position:fixed;top:24px;right:24px;z-index:100;
  }
  @media(max-width:600px){
    .region-cards{flex-direction:column;gap:16px}
    .region-card{padding:40px 24px}
    .gate-wordmark{font-size:13px}
    .gate-tagline{margin-bottom:48px}
  }
</style>
</head>
<body>

<div class="gate-theme">
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme"></button>
</div>

<div class="gate">
  <div class="gate-wordmark">Engineered Adherence</div>
  <div style="width:32px;height:1px;background:var(--line-strong);margin:16px auto"></div>
  <p class="gate-tagline">Select your region to continue</p>

  <div class="region-cards">
    <a href="/us/" class="region-card">
      <span class="region-ghost">US</span>
      <div class="region-flag" style="font-family:var(--font-mono);font-size:10px;letter-spacing:3px;color:var(--faint);opacity:0.5">US</div>
      <div class="region-name">United States</div>
      <div class="region-sub">North America</div>
      <div class="region-desc">Research compounds · Shop online · AI protocol advisor</div>
      <div class="region-cta">Enter →</div>
    </a>

    <a href="/qa/" class="region-card">
      <span class="region-ghost">QA</span>
      <div class="region-flag" style="font-family:var(--font-mono);font-size:10px;letter-spacing:3px;color:var(--faint);opacity:0.5">QA</div>
      <div class="region-name">Qatar</div>
      <div class="region-sub">Middle East</div>
      <div class="region-desc">Therapeutic protocols · Clinical consultation · Doha</div>
      <div class="region-cta">Enter →</div>
    </a>
  </div>

  <p class="gate-footer">&copy; 2026 Engineered Adherence</p>
</div>

<script>
(function(){
  var toggle = document.getElementById('themeToggle');
  if(toggle){
    toggle.addEventListener('click', function(){
      var html = document.documentElement;
      var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('ea-theme', next);
    });
  }
})();
</script>
</body>
</html>
